name: Build & Push Fraud Detection Docker Image

on:
  push:
    branches: [main]
    paths:
      - 'fraud-detection-service/models/**'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract latest model version
        id: model_version
        run: |
          version=$(ls fraud-detection-service/models/model_v*.joblib |
            awk -F'[v_.]' '{print $2"."$3"."$4}' |
            sort -V | tail -n1)
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./fraud-detection-service
          file: ./fraud-detection-service/Dockerfile
          push: true
          tags: |
            yourorg/fraud-detection-service:latest
            yourorg/fraud-detection-service:${{ steps.model_version.outputs.version }}
          cache-from: type=registry,ref=yourorg/fraud-detection-service:cache
          cache-to: type=registry,ref=yourorg/fraud-detection-service:cache,mode=max
