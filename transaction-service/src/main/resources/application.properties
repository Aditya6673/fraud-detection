# Transaction Service Configuration
spring.application.name=transaction-service
server.port=8080

# Datasource (will be overridden by environment variables in docker-compose)
spring.datasource.url=jdbc:postgresql://localhost:5432/frauddb
spring.datasource.username=frauduser
spring.datasource.password=fraudpass

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.trusted.packages=*
spring.kafka.producer.enable-idempotence=true
spring.kafka.producer.acks=all
app.kafka.topic.transactions=transactions

# Flyway
flyway.locations=classpath:db/migration