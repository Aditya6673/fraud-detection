# Analytics Service Configuration
spring.application.name=analytics-service
server.port=8081

# Datasource (will be overridden by environment variables in docker-compose)
spring.datasource.url=jdbc:postgresql://localhost:5432/frauddb
spring.datasource.username=frauduser
spring.datasource.password=fraudpass

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.group-id=analytics-service

# Flyway
flyway.locations=classpath:db/migration